name: Check Divan liquidation

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: divan-liquidation-bot-main
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Show run time
        run: |
          echo "UTC time:"
          date -u

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Merge state with remote
        run: |
          git fetch origin main
          git show origin/main:state.json > remote_state.json || echo '{"seen":[]}' > remote_state.json

          python - <<'PY'
          import json
          from pathlib import Path

          local_path = Path("state.json")
          remote_path = Path("remote_state.json")

          def load(path):
              if not path.exists():
                  return {"seen": []}
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return {"seen": []}

          local_data = load(local_path)
          remote_data = load(remote_path)

          local_seen = set(local_data.get("seen", []))
          remote_seen = set(remote_data.get("seen", []))

          merged = sorted(local_seen | remote_seen)

          local_path.write_text(
              json.dumps({"seen": merged}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print(f"Merged state size: {len(merged)}")
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git reset --soft origin/main

          git add state.json

          if git diff --cached --quiet; then
            echo "Нет изменений в state.json"
            exit 0
          fi

          git commit -m "Update state.json"
          git push origin HEAD:main

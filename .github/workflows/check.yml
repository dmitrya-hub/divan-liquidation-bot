name: check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: divan-liquidation-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Show run time
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref_name }}"
          echo "UTC time:"
          date -u

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Prepare state snapshot
        run: |
          cp state.json local_state.json

          python - <<'PY'
          import json
          from pathlib import Path

          def load_seen(path):
              try:
                  data = json.loads(Path(path).read_text(encoding="utf-8"))
                  return set(data.get("seen", []))
              except Exception:
                  return set()

          local_seen = load_seen("local_state.json")

          # Snapshot-логика:
          # сохраняем только товары, которые бот увидел в текущем успешном запуске.
          # Если товар исчезнет из выдачи, он удалится из state.json.
          # Если потом появится снова с тем же URL, бот снова пришлёт уведомление.
          saved_seen = sorted(local_seen)

          Path("state.json").write_text(
              json.dumps({"seen": saved_seen}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print(f"Local seen: {len(local_seen)}")
          print(f"Saved seen snapshot: {len(saved_seen)}")
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json

          if git diff --cached --quiet; then
            echo "Нет изменений в state.json"
            exit 0
          fi

          git commit -m "Update state.json"

          for i in 1 2 3; do
            echo "Push attempt $i"

            if git push origin HEAD:main; then
              echo "Push successful"
              exit 0
            fi

            echo "Push failed, rebasing and retrying..."

            git fetch origin main

            if git rebase origin/main; then
              echo "Rebase successful"
            else
              echo "Rebase failed, keeping local state snapshot"

              git rebase --abort || true

              git add state.json
              git commit -m "Update state.json" || true
            fi

            sleep 3
          done

          echo "Не удалось запушить state.json после 3 попыток"
          exit 1

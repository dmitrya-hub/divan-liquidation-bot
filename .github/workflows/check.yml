name: Check Divan liquidation
run-name: "Divan check • ${{ github.event_name }} • ${{ github.ref_name }}"

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: divan-liquidation-bot-main
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Show run time
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref_name }}"
          echo "UTC time:"
          date -u

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Merge local and remote state
        run: |
          git fetch origin main
          git show origin/main:state.json > remote_state.json || echo '{"seen":[]}' > remote_state.json
          cp state.json local_state.json

          python - <<'PY'
          import json
          from pathlib import Path

          def load_json(path_str):
              path = Path(path_str)
              if not path.exists():
                  return {"seen": []}
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return {"seen": []}

          local_data = load_json("local_state.json")
          remote_data = load_json("remote_state.json")

          local_seen = set(local_data.get("seen", []))
          remote_seen = set(remote_data.get("seen", []))

          merged_seen = sorted(local_seen | remote_seen)

          Path("state.json").write_text(
              json.dumps({"seen": merged_seen}, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print(f"Local seen: {len(local_seen)}")
          print(f"Remote seen: {len(remote_seen)}")
          print(f"Merged seen: {len(merged_seen)}")
          PY

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json

          if git diff --cached --quiet; then
            echo "Нет изменений в state.json"
            exit 0
          fi

          git commit -m "Update state.json"
          git push origin HEAD:main
